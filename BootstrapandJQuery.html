<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>GitHub Repository Viewer</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .card-box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,.12);
    }

    h2 { color: #444; }

    .btn-custom {
      background-color: #764ba2;
      color: white;
      border: none;
    }

    .btn-custom:hover {
      background-color: #5e3c85;
      color: white;
    }

    table thead {
      background-color: #764ba2;
      color: white;
    }
  </style>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

  <div class="container py-5">
    <div class="card-box">

      <h2 class="mb-2">GitHub Repository Viewer</h2>
      <p class="text-muted">
        Escribe el nombre de usuario de GitHub y podrás ver sus repositorios.
      </p>

      <form id="formBuscar">
        <div class="row g-2 mb-3">
          <div class="col-md-8">
            <input type="text" id="username" class="form-control" placeholder="Ej: carlalujan" required>
          </div>
          <div class="col-md-4 d-grid">
            <button type="submit" class="btn btn-custom">Buscar</button>
          </div>
        </div>
      </form>

      <div id="msg" class="alert d-none" role="alert"></div>

      <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle mb-0">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Colaboradores</th>
            </tr>
          </thead>
          <tbody id="tabla">
            <tr>
              <td colspan="3" class="text-muted">
                Introduce un usuario y pulsa “Buscar”.
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

<script>

function showMsg(type, text) {
  $("#msg")
    .removeClass("d-none alert-success alert-danger alert-warning alert-info")
    .addClass("alert alert-" + type)
    .text(text);
}

function hideMsg() {
  $("#msg").addClass("d-none").text("");
}

function escapeHtml(str) {
  if (!str) return "";
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

$("#formBuscar").on("submit", function (e) {
  e.preventDefault();
  hideMsg();

  let user = $("#username").val().trim();

  if (!user) {
    showMsg("warning", "Escribe un nombre de usuario primero.");
    return;
  }

  $("#tabla").html(
    `<tr><td colspan="3" class="text-muted">Cargando repositorios...</td></tr>`
  );

  // Comprobar usuario
  $.getJSON("https://api.github.com/users/" + encodeURIComponent(user))
    .done(function () {

      // Obtener repos
      $.getJSON("https://api.github.com/users/" + encodeURIComponent(user) + "/repos?per_page=100")
        .done(function (repos) {

          if (!repos || repos.length === 0) {
            $("#tabla").html(
              `<tr><td colspan="3" class="text-muted">Este usuario no tiene repos públicos.</td></tr>`
            );
            return;
          }

          $("#tabla").html("");

          repos.forEach(function (repo) {

            const repoName = escapeHtml(repo.name);
            const desc = escapeHtml(repo.description || "—");
            const rowId = "c_" + repo.id;

            $("#tabla").append(
              `<tr>
                <td>
                  <a href="${repo.html_url}" target="_blank" class="fw-semibold text-decoration-none">
                    ${repoName}
                  </a>
                </td>
                <td>${desc}</td>
                <td id="${rowId}" class="text-muted">Cargando...</td>
              </tr>`
            );

            // Obtener colaboradores
            $.getJSON(repo.contributors_url + "?per_page=10")
              .done(function (contributors) {

                let lista = "—";

                if (contributors && contributors.length > 0) {
                  lista = contributors.map(c => c.login).join(", ");
                }

                $("#" + rowId)
                  .removeClass("text-muted")
                  .text(lista);
              })
              .fail(function (jqxhr) {

                if (jqxhr.status === 403) {
                  $("#" + rowId).text("Rate limit alcanzado");
                } else {
                  $("#" + rowId).text("No disponible");
                }

                $("#" + rowId).removeClass("text-muted");
              });

          });

        })
        .fail(function () {
          showMsg("danger", "Error cargando repositorios.");
          $("#tabla").html(
            `<tr><td colspan="3" class="text-muted">No se pudo cargar la tabla.</td></tr>`
          );
        });

    })
    .fail(function () {
      showMsg("danger", "Usuario no encontrado.");
      $("#tabla").html(
        `<tr><td colspan="3" class="text-muted">Introduce un usuario válido.</td></tr>`
      );
    });
});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
